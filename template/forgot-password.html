<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Forgot Password | SmartHealth AI</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-bg">

<div class="auth-card">
  <h2>Reset Password</h2>

  <form onsubmit="resetPassword(event)">
    <input type="email" id="fpEmail" placeholder="Registered Email" required>
    <small class="error" id="fpError"></small>

    <input type="password"
      id="fpPassword"
      placeholder="New Password"
      pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z])(?=.*[@$!%*?&]).{8,}"
      required>

    <button type="submit">Update Password</button>
  </form>

  <p><a href="login.html">Back to Login</a></p>
</div>

<script src="js/main.js"></script>
<div id="toast" class="toast hidden"></div>
<div id="loader" class="loader hidden"></div>
</body>
</html>
